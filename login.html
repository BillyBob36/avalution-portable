<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Connexion — Avalution Portable</title>
<link rel="icon" href="data:,">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overscroll-behavior: none; }
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        padding-top: max(20px, env(safe-area-inset-top));
        padding-bottom: max(20px, env(safe-area-inset-bottom));
        color: white;
    }
    .login-card {
        background: rgba(20, 20, 40, 0.85);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5),
                    0 0 60px rgba(102, 126, 234, 0.15);
        padding: 40px 36px 32px;
        width: 100%;
        max-width: 420px;
        text-align: center;
    }
    .login-mark {
        font-size: 56px;
        line-height: 1;
        margin-bottom: 8px;
    }
    .login-title {
        font-size: 24px;
        font-weight: 600;
        margin-bottom: 6px;
        letter-spacing: -0.2px;
    }
    .login-sub {
        color: rgba(255, 255, 255, 0.55);
        font-size: 13px;
        margin-bottom: 28px;
        line-height: 1.4;
    }
    .btn-google {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        width: 100%;
        padding: 14px 18px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 14px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        font-size: 15px;
        font-weight: 500;
        cursor: pointer;
        text-decoration: none;
        transition: transform 0.15s ease, box-shadow 0.2s ease;
        box-shadow: 0 4px 18px rgba(102, 126, 234, 0.35);
    }
    .btn-google:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 24px rgba(102, 126, 234, 0.5);
    }
    .btn-google:active {
        transform: translateY(0);
    }
    .btn-google svg {
        background: white;
        border-radius: 50%;
        padding: 2px;
    }
    .login-error {
        margin-top: 20px;
        padding: 12px 14px;
        background: rgba(255, 100, 100, 0.1);
        border: 1px solid rgba(255, 100, 100, 0.3);
        color: rgba(255, 200, 200, 0.95);
        border-radius: 10px;
        font-size: 13px;
        line-height: 1.5;
    }
    .login-error.hidden { display: none; }
    .login-error strong { color: white; }
    .login-restrict {
        margin-top: 28px;
        color: rgba(255, 255, 255, 0.35);
        font-size: 11px;
        line-height: 1.5;
    }
    .preview-strip {
        margin-top: 32px;
        padding-top: 28px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        display: flex;
        justify-content: center;
        gap: 6px;
    }
    .preview-dot {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        background-size: cover;
        background-position: center;
        border: 1px solid rgba(255, 255, 255, 0.1);
        opacity: 0.6;
    }
</style>
</head>
<body>
    <main class="login-card">
        <div class="login-mark">🎭</div>
        <h1 class="login-title">Avalution Portable</h1>
        <p class="login-sub">Avatar conversationnel avec lip-sync intelligent</p>

        <a href="/auth/google/login" class="btn-google" id="login-btn">
            <svg width="20" height="20" viewBox="0 0 48 48">
                <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3l5.7-5.7C34 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.5-.4-3.5z"/>
                <path fill="#FF3D00" d="m6.3 14.7 6.6 4.8C14.7 15.1 19 12 24 12c3.1 0 5.9 1.2 8 3l5.7-5.7C34 6.1 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
                <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2L31.2 33.7c-2 1.5-4.5 2.3-7.2 2.3-5.2 0-9.6-3.3-11.3-7.9l-6.5 5C9.5 39.6 16.2 44 24 44z"/>
                <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4.1 5.5l6.2 4.8c-.4.4 6.6-4.8 6.6-14.3 0-1.3-.1-2.5-.4-3.5z"/>
            </svg>
            Se connecter avec Google
        </a>

        <div class="login-error hidden" id="login-error"></div>

        <p class="login-restrict">
            Outil restreint — connexion réservée aux comptes Google autorisés.
        </p>

        <div class="preview-strip" aria-hidden="true">
            <div class="preview-dot" style="background-image:url('backgrounds/office-1.png')"></div>
            <div class="preview-dot" style="background-image:url('backgrounds/office-2.png')"></div>
            <div class="preview-dot" style="background-image:url('backgrounds/office-3.png')"></div>
            <div class="preview-dot" style="background-image:url('backgrounds/office-4.png')"></div>
        </div>
    </main>

<script>
const params = new URLSearchParams(location.search);
const err = params.get('error');
const email = params.get('email');
const errBox = document.getElementById('login-error');
if (err) {
    const messages = {
        unauthorized: `Le compte ${email ? `<strong>${email}</strong>` : 'Google'} n'est pas autorisé sur cet outil. Demande l'accès à l'administrateur.`,
        invalid_state: "Session expirée — réessaie.",
        token_exchange: "Échec de l'échange de tokens avec Google.",
        unverified: "Ton adresse Google doit être vérifiée.",
        access_denied: "Connexion annulée.",
    };
    errBox.innerHTML = messages[err] || `Erreur : ${err}`;
    errBox.classList.remove('hidden');
}
// Si déjà connecté, on saute la page de login.
fetch('/api/me').then(r => { if (r.ok) location.href = '/'; }).catch(() => {});
</script>
</body>
</html>
